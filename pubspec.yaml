name: fuel_tracker
description: Bike Fuel Tracker - Track mileage automatically using AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.7
  http: ^1.2.1
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
