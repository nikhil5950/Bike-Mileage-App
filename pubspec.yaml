name: fuel_tracker
description: Bike Fuel Tracker - Track mileage automatically using AI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Camera & Image
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  
  # HTTP & API
  http: ^1.2.1
  
  # Local Storage
  sqflite: ^2.3.2
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  
  # Shared Preferences
  shared_preferences: ^2.2.3
  
  # Permission
  permission_handler: ^11.3.1
  
  # UUID
  uuid: ^4.4.0
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
